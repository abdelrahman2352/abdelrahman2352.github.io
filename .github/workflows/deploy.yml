name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Switch GitHub Pages source to GitHub Actions
        # If Pages is configured to "Deploy from branch: main", a competing Jekyll
        # "pages build and deployment" workflow runs on every push and overwrites
        # our built React app with raw source files, causing a white screen.
        # This call permanently switches Pages to "GitHub Actions" source so that
        # only our workflow controls deployments going forward.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method PUT "/repos/${{ github.repository }}/pages" \
            -f build_type=workflow || true

      - name: Wait for any concurrent Jekyll deployment to finish
        # On this push a Jekyll "pages build and deployment" workflow may have
        # already started before we could switch the Pages source above.
        # Wait for it to finish (~33 s) so our deployment is always the last one.
        run: sleep 60

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
